<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CrepebroPKW</title>

<style>

/* โหลดฟอนต์ */
@font-face {
  font-family: 'UnyuCartoon';
  src: url('UnyuCartoon.ttf') format('truetype');
}

/* รีเซ็ต */
*{
  box-sizing:border-box;
}

body {
  margin: 0;
  background: #f0f0f0; /* เปลี่ยนพื้นหลังข้างนอกให้เข้มขึ้นหน่อยเพื่อให้ตัวแอปเด่น */
  font-family: 'UnyuCartoon', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;    /* เพิ่มตัวนี้เพื่อให้กึ่งกลางแนวตั้ง */
  min-height: 100vh;
}

.app {
  width: 100%;
  max-width: 430px;
  height: 90vh;           /* ปรับความสูงให้ไม่เต็มจอ 100% จะได้เห็นความเป็นกล่องแอป */
  background: #ffffff;    /* พื้นหลังของตัวแอปเป็นสีขาว */
  padding: 16px;
  text-align: center;
  color: #6EC1FF;
  
  /* เพิ่มลูกเล่นให้เหมือนแอปมือถือ */
  box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
  border-radius: 20px;    /* ขอบมนเหมือนหน้าจอ iPhone/Android */
  overflow-y: auto;       /* ถ้าเนื้อหายาวเกิน ให้เลื่อนขึ้นลงได้ภายในกล่อง */
}

/* หัวข้อ */
h1{
  font-size:22px;
  margin:10px 0 15px;
}

/* ขอบ */
.top-border,
.bottom-border{
  width:100%;
  height:45px;
  object-fit:cover;
  display:block;
}

.bottom-border{
  transform:rotate(180deg);
}

/* ปุ่มควบคุม */
.control-buttons{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

/* กล่องแสดงภาพ */
.canvas{
  position:relative;
  width:100%;
  aspect-ratio:1/1;
  background:#CDEBFF;
  border-radius:25px;
  overflow:hidden;
  margin-bottom:20px;
}

.layer{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  max-width:100%;
  max-height:100%;
}

/* หมวดหมู่ */
.section{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  margin-bottom:18px;
}

.section h3{
  width:100%;
  font-size:16px;
  margin-bottom:6px;
}

/* ปุ่ม */
button{
  background:#EAF6FF;
  border:2px solid #CDEBFF;
  padding:8px 12px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
  font-family:'UnyuCartoon', sans-serif;
  color:#0066CC;
  transition:0.2s;
}

button:hover{
  background:#D6EEFF;
  transform:translateY(-2px);
}

button:active{
  transform:scale(0.95);
}

</style>
</head>

<body>

<div class="app">

<img src="001.png" class="top-border">

<h1>PKWCrepebro</h1>

<div class="control-buttons">
  <button onclick="playMusic()">▶ play</button>
  <button onclick="pauseMusic()">⏸ stop</button>
  <button onclick="downloadImage()">⬇ download</button>
</div>

<div class="canvas" id="captureArea">
  <img id="layer5" class="layer">
  <img id="layer4" class="layer">
  <div id="layer3" class="layer"></div>
  <div id="layer2" class="layer"></div>
  <img id="layer1" class="layer">
</div>

<div class="section">
<h3>Batter</h3>
<button onclick="setImage(5,'34.png')">charcoal</button>
<button onclick="setImage(5,'35.png')">creme</button>
</div>

<div class="section">
<h3>Base</h3>
<button onclick="setImage(4,'24.png')">white</button>
<button onclick="setImage(4,'25.png')">choco</button>
<button onclick="setImage(4,'26.png')">purple</button>
<button onclick="setImage(4,'27.png')">blueberry</button>
<button onclick="setImage(4,'28.png')">pink</button>
<button onclick="setImage(4,'29.png')">green</button>
<button onclick="setImage(4,'30.png')">strawberry</button>
<button onclick="setImage(4,'31.png')">orange</button>
<button onclick="setImage(4,'32.png')">yellow</button>
<button onclick="setImage(4,'33.png')">matcha</button>
</div>

<div class="section">
<h3>Toppings</h3>
<button onclick="setImage(3,'13.png')">kiwi</button>
<button onclick="setImage(3,'14.png')">sausage</button>
<button onclick="setImage(3,'15.png')">popcorn</button>
<button onclick="setImage(3,'16.png')">strawberry</button>
<button onclick="setImage(3,'17.png')">carrot</button>
<button onclick="setImage(3,'18.png')">bacon</button>
<button onclick="setImage(3,'19.png')">medmaengrak</button>
<button onclick="setImage(3,'20.png')">banana</button>
<button onclick="setImage(3,'21.png')">cornflakes</button>
<button onclick="setImage(3,'22.png')">crab</button>
<button onclick="setImage(3,'23.png')">brownies</button>
</div>

<div class="section">
<h3>Sauce</h3>
<button onclick="setImage(2,'1.png')">strawberry</button>
<button onclick="setImage(2,'2.png')">cheese</button>
<button onclick="setImage(2,'3.png')">rainbow</button>
<button onclick="setImage(2,'4.png')">choco</button>
<button onclick="setImage(2,'5.png')">matcha</button>
<button onclick="setImage(2,'6.png')">milk</button>
<button onclick="setImage(2,'7.png')">choco sauce</button>
<button onclick="setImage(2,'8.png')">orange</button>
<button onclick="setImage(2,'9.png')">blueberry</button>
<button onclick="setImage(2,'10.png')">green</button>
<button onclick="setImage(2,'11.png')">taro</button>
<button onclick="setImage(2,'12.png')">pink</button>
</div>

<div class="section">
<h3>Crepe Batter</h3>
<button onclick="setImage(1,'ชาโค.png')">charcoal</button>
<button onclick="setImage(1,'นมสด.png')">creme</button>
</div>

<img src="001.png" class="bottom-border">

</div>

<audio id="bgMusic" src="yummy.mp3"></audio>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
function setImage(layer, file){
  document.getElementById("layer"+layer).src = file;
}

function playMusic(){
  document.getElementById("bgMusic").play();
}

function pauseMusic(){
  document.getElementById("bgMusic").pause();
}

function downloadImage(){
  html2canvas(document.getElementById("captureArea")).then(canvas=>{
    const link=document.createElement("a");
    link.download="repebro.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
