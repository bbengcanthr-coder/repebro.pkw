<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>repebro</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🥞 repebro</h1>

<audio id="bgm" autoplay loop>
  <source src="audio/bgm.mp3" type="audio/mpeg">
</audio>

<div class="game">

  <div class="canvas">
    <!-- ล่างสุด -->
    <img id="layer5" class="layer layer5">
    <img id="layer4" class="layer layer4">
    <img id="layer3" class="layer layer3">
    <img id="layer2" class="layer layer2">
    <!-- บนสุด -->
    <img id="layer1" class="layer layer1">
  </div>

  <div class="controls">

    <h3>ฐาน (5)</h3>
    <button onclick="setImage(5,'images/step5/base1.png')">Base 1</button>
    <button onclick="setImage(5,'images/step5/base2.png')">Base 2</button>

    <h3>เลเยอร์ 4</h3>
    <button onclick="setImage(4,'images/step4/l4_1.png')">L4-1</button>

    <h3>เลเยอร์ 3</h3>
    <button onclick="setImage(3,'images/step3/l3_1.png')">L3-1</button>

    <h3>เลเยอร์ 2</h3>
    <button onclick="setImage(2,'images/step2/l2_1.png')">L2-1</button>

    <h3>เลเยอร์ 1 (บนสุด)</h3>
    <button onclick="setImage(1,'images/step1/top1.png')">Top</button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
