<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repebro PKW</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Mitr',sans-serif;
  background:linear-gradient(#ffffff);
  text-align:center;
}

h1{
  margin:20px 0 10px 0;
  font-weight:600;
}

/* ขอบบน */
.top-border{
  width:100%;
  height:25px;   /* ปรับเล็กลงตรงนี้ */
  object-fit:cover;
  display:block;
}

/* ขอบล่าง */
.bottom-border{
  width:100%;
  height:25px;
  object-fit:cover;
  display:block;
  transform:rotate(180deg);
}

.top-buttons{
  margin-bottom:15px;
}

.top-buttons button{
  background:#ffffff;
  border:none;
  padding:8px 14px;
  margin:4px;
  border-radius:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  cursor:pointer;
}

.canvas{
  position:relative;
  width:90vw;
  max-width:360px;
  aspect-ratio:1/1;
  margin:0 auto 25px auto;
  background:#fff;
  border-radius:25px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  overflow:hidden;
}

.layer{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  max-width:100%;
  max-height:100%;
}

.controls{
  padding:10px;
}

h3{
  margin:18px 0 8px 0;
}

.controls button{
  background:#dff4ff;
  border:none;
  padding:6px 12px;
  margin:4px;
  border-radius:20px;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
  cursor:pointer;
  font-size:14px;
  transition:0.2s;
}

.controls button:hover{
  background:#ffd9ec;
}
</style>
</head>

<body>
  <img src="Untitled design.png" class="top-border">

<h1>🥞 repebro PKW</h1>

<div class="top-buttons">
  <button onclick="playMusic()">▶ เล่นเพลง</button>
  <button onclick="pauseMusic()">⏸ หยุด</button>
  <button onclick="downloadImage()">⬇ ดาวน์โหลด</button>
</div>

<div class="canvas" id="captureArea">
  <img id="layer5" class="layer">
  <img id="layer4" class="layer">
  <img id="layer3" class="layer">
  <img id="layer2" class="layer">
  <img id="layer1" class="layer">
</div>

<div class="controls">

<!-- ลำดับ 5 -->
<h3>batter</h3>
<button onclick="setImage(5,'34.png')">charcoalbase</button>
<button onclick="setImage(5,'35.png')">cremebase</button>

<!-- ลำดับ 4 -->
<h3>base</h3>
<button onclick="setImage(4,'24.png')">whitebase</button>
<button onclick="setImage(4,'25.png')">chocobase</button>
<button onclick="setImage(4,'26.png')">purplebase</button>
<button onclick="setImage(4,'27.png')">blueberrybase</button>
<button onclick="setImage(4,'28.png')">pinkbase</button>
<button onclick="setImage(4,'29.png')">greenbase</button>
<button onclick="setImage(4,'30.png')">strawberrybase</button>
<button onclick="setImage(4,'31.png')">orangebase</button>
<button onclick="setImage(4,'32.png')">yellowbase</button>
<button onclick="setImage(4,'33.png')">matchabase</button>

<!-- ลำดับ 3 -->
<h3>Toppings</h3>
<button onclick="setImage(3,'13.png')">kiwi</button>
<button onclick="setImage(3,'14.png')">sausage</button>
<button onclick="setImage(3,'15.png')">popcorn</button>
<button onclick="setImage(3,'16.png')">strawberry</button>
<button onclick="setImage(3,'17.png')">carrot</button>
<button onclick="setImage(3,'18.png')">bacon</button>
<button onclick="setImage(3,'19.png')">med-maeng-rakำ</button>
<button onclick="setImage(3,'20.png')">banana</button>
<button onclick="setImage(3,'21.png')">cornflakes</button>
<button onclick="setImage(3,'22.png')">crabfight</button>
<button onclick="setImage(3,'23.png')">brownies</button>

<!-- ลำดับ 2 -->
<h3>Sauce</h3>
<button onclick="setImage(2,'1.png')">strawberrysauce</button>
<button onclick="setImage(2,'2.png')">cheesesauce</button>
<button onclick="setImage(2,'3.png')">rainbowsprinkle</button>
<button onclick="setImage(2,'4.png')">chocosprinkle</button>
<button onclick="setImage(2,'5.png')">matchasauce</button>
<button onclick="setImage(2,'6.png')">milksauce</button>
<button onclick="setImage(2,'7.png')">chocosauce</button>
<button onclick="setImage(2,'8.png')">orangesauce</button>
<button onclick="setImage(2,'9.png')">blueberrysauce</button>
<button onclick="setImage(2,'10.png')">greensauce</button>
<button onclick="setImage(2,'11.png')">tarosauce</button>
<button onclick="setImage(2,'12.png')">pinksauce</button>

<!-- ลำดับ 1 -->
<h3>Crepe batter</h3>
<button onclick="setImage(1,'ชาโค.png')">creme</button>
<button onclick="setImage(1,'นมสด.png')">charcoal</button>

</div>

<audio id="bgMusic" src="yummy.mp3"></audio>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
function setImage(layer, file){
  document.getElementById("layer"+layer).src = file;
}

function playMusic(){
  document.getElementById("bgMusic").play();
}

function pauseMusic(){
  document.getElementById("bgMusic").pause();
}

function downloadImage(){
  html2canvas(document.getElementById("captureArea")).then(canvas=>{
    const link=document.createElement("a");
    link.download="repebro.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}
</script>
  <img src="Untitled design.png" class="bottom-border">

</body>
</html>
