<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrepebroPKW</title>

<style>

/* โหลดฟอนต์ */
@font-face {
  font-family: 'UnyuCartoon';
  src: url('UnyuCartoon.ttf') format('truetype');
}

/* รีเซ็ต */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* จัดหน้า */
body{
  background:#ffffff;
  font-family:'UnyuCartoon', sans-serif;
  display:flex;
  justify-content:center;
}

.app{
  width:100%;
  max-width:430px;
  min-height:100vh;
  padding:16px;
  text-align:center;
  color:#6EC1FF;
}

/* หัวข้อ + ไอคอน */
h1{
  font-size:22px;
  margin:15px 0;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px;
}

.mini-icon{
  width:18px;
  height:auto;
}

/* ขอบ */
.top-border,
.bottom-border{
  width:100%;
  height:40px;
  object-fit:cover;
}

.bottom-border{
  transform:rotate(180deg);
}

/* ปุ่มควบคุม */
.control-buttons{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  margin:10px 0 15px;
}

/* กล่องภาพ */
.canvas{
  position:relative;
  width:100%;
  aspect-ratio:1/1;
  background:#CDEBFF;
  border-radius:25px;
  overflow:hidden;
  margin-bottom:20px;
}

.layer{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  max-width:100%;
  max-height:100%;
}

/* หมวด */
.section{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  margin-bottom:18px;
}

.section h3{
  width:100%;
  font-size:16px;
  margin-bottom:6px;
}

/* ปุ่ม */
button{
  background:#EAF6FF;
  border:2px solid #CDEBFF;
  padding:8px 12px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
  font-family:'UnyuCartoon', sans-serif;
  color:#0066CC;
  transition:0.2s;
}

button:hover{
  background:#D6EEFF;
}

button:active{
  transform:scale(0.95);
}

</style>
</head>

<body>

<div class="app">

<img src="001.png" class="top-border">

<h1>
  <img src="icon.png" class="mini-icon">
  PKWCrepebro
</h1>

<div class="control-buttons">
  <button onclick="playMusic()">▶ play</button>
  <button onclick="pauseMusic()">⏸ stop</button>
  <button onclick="downloadImage()">⬇ download</button>
</div>

<div class="canvas" id="captureArea">
  <img id="layer5" class="layer">
  <img id="layer4" class="layer">
  <img id="layer3" </div>
  <img id="layer2" </div>
  <img id="layer1" class="layer">
</div>

<!-- หมวดต่าง ๆ ของคุณยังใช้แบบเดิมได้ -->

<img src="001.png" class="bottom-border">

</div>

<audio id="bgMusic" src="yummy.mp3"></audio>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
function setImage(layer, file){
  document.getElementById("layer"+layer).src = file;
}

function playMusic(){
  document.getElementById("bgMusic").play();
}

function pauseMusic(){
  document.getElementById("bgMusic").pause();
}

function downloadImage(){
  html2canvas(document.getElementById("captureArea")).then(canvas=>{
    const link=document.createElement("a");
    link.download="repebro.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
